openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: M15-AUDIT API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: Firm user administration (RBAC)
  - name: staff
    description: Module M29 - PME staff management (RBAC & Gestion du Personnel PME); the company owner creates restricted "client_staff" accounts
  - name: audit
    description: Audit trail
  - name: clients
    description: Client / dossier management
  - name: missions
    description: SYSCOHADA visa missions
  - name: documents
    description: Document management (GED)
  - name: dashboard
    description: Dashboard aggregates
  - name: accounting
    description: Comptabilité simplifiée (P3) & Comptabilité et travaux (M3) - SYSCOHADA ledger
  - name: caisse
    description: Caisse Terrain (P5) - physical cash register control, quick offline-capable entries and daily closures
  - name: reporting
    description: Automated financial statements (M3 reporting) and the PME director's pilotage dashboard (P4), computed live from the validated general ledger
  - name: assets
    description: Fixed assets & depreciation engine (M17) - SYSCOHADA Class 2 asset registry, straight-line and declining-balance schedules, year-end dotation entries
  - name: closing
    description: Fiscal year-end closing (M19) — official period lock, net result computation (Résultat net 131/139), and Journal des À-nouveaux generation for year+1
  - name: payroll
    description: Ivorian payroll (M20) - CNPS, IS, CN, ITS and aggregated ledger posting
  - name: tax
    description: Télédéclaration TVA (M21) - Formulaire D-201/VA computation, deductible-VAT annex (État Annexé), and liquidation posting
  - name: cabinet-analytics
  - name: analytical
    description: Cabinet internal operations (M22) - collaborator timesheets, cost/billing rates, client forfait contracts, and per-client profitability reporting
  - name: invoicing
    description: Module M28 — Facturier Client & Auto-Génération de Pièces — structured invoice registry, chronological numbering (FAC-YYYY-XXXX), PDF receipt generation, and automatic SYSCOHADA 411/706/443 ledger posting
  - name: chat
    description: Module M31 — Messagerie Interne du Cabinet ("le Slack du Cabinet") — internal channels and direct messages for cabinet staff only (expert_comptable / collaborateur / stagiaire); client portal accounts have no access
  - name: payroll-settings
    description: Module M20-Settings — Cabinet-level editable payroll tax & social contribution rates (CNPS, ITS, FDFP, Transport exemption). Read access for all cabinet roles; write access restricted to expert_comptable and collaborateur.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new accounting firm and its first administrator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Firm and user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate and obtain a JWT
      description: >-
        Module M33 - when the account still has an unresolved temporary
        password, this returns status "FORCE_PASSWORD_CHANGE" and a
        restricted token instead of a normal session; the frontend must
        redirect to the password-reset screen and call
        POST /auth/reset-first-password before anything else works.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-first-password:
    post:
      operationId: resetFirstPassword
      tags: [auth]
      summary: Module M33 - exchange a restricted first-login token for a full session by setting a new password
      description: >-
        Only usable with the restricted token returned by POST /auth/login
        when status was "FORCE_PASSWORD_CHANGE". Clears
        requiresPasswordChange and the stored temporary password, then
        returns a normal full-session token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetFirstPasswordInput"
      responses:
        "200":
          description: Password changed, full session issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Passwords don't match or don't meet the strength policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Token is not a valid password-reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users belonging to the current firm
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create (invite) a new user in the current firm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Remove a user from the firm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /roles:
    get:
      operationId: listRoles
      tags: [staff]
      summary: List the system-wide staff role catalog (module M29)
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List the current PME's staff accounts (module M29, owner only)
      responses:
        "200":
          description: List of staff accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffUser"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a new staff account for the current PME (module M29, owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /staff/{id}:
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff account's role or status (module M29, owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated staff account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"
        "404":
          description: Staff account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Remove a staff account (module M29, owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Staff account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List the firm's audit trail (who did what, when)
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: userRole
          in: query
          required: false
          schema:
            type: string
        - name: aiOverrideOnly
          in: query
          required: false
          description: Module M14 - when true, return only AI_OVERRIDE entries (Espace Cabinet compliance log highlight).
          schema:
            type: boolean
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Aggregate counts for the firm's dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients (dossiers) of the current firm
      parameters:
        - name: missionStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MissionStatus"
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client dossier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{id}/documents:
    get:
      operationId: listClientDocuments
      tags: [documents]
      summary: List all documents (GED) stored for a client, across all folders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents (metadata only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadClientDocument
      tags: [documents]
      summary: Upload a document (PDF/image) into a client's folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents (GED) across every client dossier of the firm
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of documents (metadata only)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document including its base64-encoded content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /missions:
    get:
      operationId: listMissions
      tags: [missions]
      summary: List visa missions
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MissionStatus"
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"
    post:
      operationId: createMission
      tags: [missions]
      summary: Open a new visa mission for a client and fiscal year (auto-determines the SYSCOHADA system and generates the control checklist)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionInput"
      responses:
        "201":
          description: Mission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /missions/{id}:
    get:
      operationId: getMission
      tags: [missions]
      summary: Get mission detail including its checklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mission detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionDetail"
        "404":
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMission
      tags: [missions]
      summary: Update a mission's status (visa workflow tracker)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionUpdate"
      responses:
        "200":
          description: Updated mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
        "404":
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /missions/{id}/checklist:
    get:
      operationId: listMissionChecklistItems
      tags: [missions]
      summary: List the control checklist items of a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistItem"

  /missions/{id}/checklist/{itemId}:
    patch:
      operationId: updateMissionChecklistItem
      tags: [missions]
      summary: Update a checklist item's control status / note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistItemUpdate"
      responses:
        "200":
          description: Updated checklist item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItem"
        "404":
          description: Checklist item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounting/categories:
    get:
      operationId: listTransactionCategories
      tags: [accounting]
      summary: List the plain-language PME categories available for a given operation type, with their matching engine mapping
      parameters:
        - name: type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TransactionType"
      responses:
        "200":
          description: Available categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionCategoryOption"

  /cabinet/pending-counts/{clientId}:
    get:
      operationId: getCabinetPendingCounts
      tags: [accounting]
      summary: Instant counters for the cabinet review queue (module M32) -- how many of this client's submitted entries are still "à valider", split by type, so nav badges can update live without polling the full transaction list.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending review counts for this client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingCounts"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cabinet/pending-counts:
    get:
      operationId: getFirmPendingCounts
      tags: [accounting]
      summary: Instant counters for the cabinet review queue (module M32), aggregated across every client in the firm -- used for the global "Révision Dépenses" / "Révision Recettes" navigation badges, which are not scoped to a single client dossier.
      responses:
        "200":
          description: Pending review counts across the whole firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingCounts"

  /cabinet/payroll-settings:
    get:
      operationId: listPayrollSettings
      tags: [payroll-settings]
      summary: List all payroll tax & social contribution rate settings for the authenticated cabinet firm (M20-Settings). Lazy-seeds statutory defaults on first call. Read access for all cabinet roles.
      responses:
        "200":
          description: Ordered list of payroll settings grouped by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollSetting"

  /cabinet/payroll-settings/{id}:
    put:
      operationId: updatePayrollSetting
      tags: [payroll-settings]
      summary: Update a payroll rate percentage or ceiling amount (M20-Settings). Restricted to expert_comptable and collaborateur; returns 403 for any other role or for non-editable rows.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollSettingUpdate"
      responses:
        "200":
          description: Updated setting with auditor info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollSetting"
        "400":
          description: Validation error or no-op update
        "403":
          description: Forbidden — row is not editable or caller's role is insufficient
        "404":
          description: Setting not found

  /transactions:
    get:
      operationId: listTransactions
      tags: [accounting]
      summary: List journal entries (module P3/M3). Espace PME accounts only ever see their own client's entries.
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TransactionStatus"
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionDetail"
    post:
      operationId: createTransaction
      tags: [accounting]
      summary: Declare a new plain-language cash entry (module P3). The matching engine computes its SYSCOHADA journal lines and saves it as "à valider".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [accounting]
      summary: Get a transaction's detail including its computed journal lines
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/approve:
    post:
      operationId: approveTransaction
      tags: [accounting]
      summary: "Approuver & Comptabiliser: locks the transaction permanently into the general ledger (module M3)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved transaction, with optional auto-synced fixed asset stubs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveTransactionResult"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transaction is not in a state that can be approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/reject:
    post:
      operationId: rejectTransaction
      tags: [accounting]
      summary: "Invalider: sends the transaction back to the PME with a clarification note (module M3)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRejectInput"
      responses:
        "200":
          description: Rejected transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transaction is not in a state that can be rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/settle:
    post:
      operationId: settleTransaction
      tags: [accounting]
      summary: "Marquer comme payé: records the settlement of a credit (à crédit) operation. Creates a second, separately reviewed transaction that moves the balance from the third-party account (4111/4011) to treasury (module P3/M3)."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionSettleInput"
      responses:
        "201":
          description: Settlement transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "400":
          description: Transaction is not an outstanding credit operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transaction is already settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}/journal-lines:
    patch:
      operationId: updateTransactionJournalLines
      tags: [accounting]
      summary: "Cabinet-only: adjust the account number of one or more computed journal lines (e.g. the 4111/4011 third-party mapping) before final validation (module M3). Only allowed while the transaction is still à valider."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJournalLinesInput"
      responses:
        "200":
          description: Transaction with updated journal lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transaction is no longer editable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/batch:
    post:
      operationId: batchCreateTransactions
      tags: [accounting]
      summary: "Module P5 (Caisse Terrain) offline sync: creates several plain-language cash entries at once, e.g. queued while a Caisse Express device was hors-ligne. Each entry is validated and inserted independently -- one invalid entry never blocks the rest of the batch."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateTransactionsInput"
      responses:
        "200":
          description: Batch result (partial success is possible; see `errors`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateTransactionsResult"

  /cash-registers:
    get:
      operationId: listCashRegisters
      tags: [caisse]
      summary: "List the cash registers (module P5). Espace PME accounts only ever see their own client's registers."
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of cash registers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashRegister"
    post:
      operationId: createCashRegister
      tags: [caisse]
      summary: Create a new cash register for a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashRegisterInput"
      responses:
        "201":
          description: Cash register created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegister"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cash-registers/{id}:
    get:
      operationId: getCashRegister
      tags: [caisse]
      summary: Get a cash register's detail, including its live balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cash register detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashRegister"
        "404":
          description: Cash register not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cash-registers/{id}/closure-today:
    get:
      operationId: getTodayClosure
      tags: [caisse]
      summary: "Get (or auto-create, if none exists yet) today's OPEN daily closure for this register, including its live theoretical balance ('Solde théorique')."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's daily closure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClosure"
        "404":
          description: Cash register not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cash-registers/{id}/closures:
    get:
      operationId: listClosures
      tags: [caisse]
      summary: List past daily closures for a register, most recent first
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of daily closures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyClosure"

  /cash-registers/{id}/closures/{closureId}/close:
    post:
      operationId: closeDailyClosure
      tags: [caisse]
      summary: "'Clôturer la journée' (Clôture de Caisse en 1 Tap): records the physically counted balance, computes the écart de caisse against the theoretical balance, and -- if they differ -- books the discrepancy and pushes it to the cabinet's À valider queue."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: closureId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseDailyClosureInput"
      responses:
        "200":
          description: Closed daily closure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseDailyClosureResult"
        "400":
          description: Invalid input, e.g. missing mandatory justification comment for a non-zero écart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Cash register or closure not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Closure is already closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pump-shifts/last-index:
    get:
      operationId: getLastPumpIndex
      tags: [station-service]
      summary: "Module P7: the ending index (compteur de fin) of the most recent shift recorded for this pump/fuel-type combination, used to prefill the read-only 'Index de Début' field. Returns null the first time a pump/fuel is used."
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: pumpLabel
          in: query
          required: true
          schema:
            type: string
        - name: fuelType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FuelType"
      responses:
        "200":
          description: Last recorded index, or null if this pump/fuel has no prior shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastPumpIndexResult"

  /pump-shifts:
    get:
      operationId: listPumpShifts
      tags: [station-service]
      summary: "Module P7: list pump shifts for a client, optionally filtered by status (e.g. status=OPEN to find shifts awaiting sale validation)."
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PumpShiftStatus"
      responses:
        "200":
          description: List of pump shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PumpShift"
    post:
      operationId: createPumpShift
      tags: [station-service]
      summary: "'Relevé d'index de pompe': records a pump's start/end meter readings for one service shift. indexStart is resolved server-side from the pump/fuel's last shift, never trusted from the client."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PumpShiftCreateInput"
      responses:
        "201":
          description: Pump shift created (status OPEN, awaiting sale validation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PumpShift"
        "400":
          description: Invalid input, e.g. index de fin inférieur à l'index de début
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pump-shifts/{id}:
    get:
      operationId: getPumpShift
      tags: [station-service]
      summary: Get one pump shift's detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pump shift detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PumpShift"
        "404":
          description: Pump shift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pump-shifts/{id}/validate:
    post:
      operationId: validatePumpShift
      tags: [station-service]
      summary: "'Valider le Shift' (Ventes de carburant): sets the unit price and payment method, computes the expected cash from the sold volume, posts the SYSCOHADA sale entry, and -- for espèces settlements -- compares the declared physical cash to the expected amount, booking any écart as a separate reviewable transaction."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PumpShiftValidateInput"
      responses:
        "200":
          description: Validated pump shift, with the posted sale (and optional écart) transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PumpShiftValidateResult"
        "400":
          description: Invalid input, e.g. missing declared cash for an espèces settlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pump shift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Pump shift already validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile-money/transfers:
    post:
      operationId: createMobileMoneyTransfer
      tags: [station-service]
      summary: "Module P7 Mobile Money (Cabinet): records a 'Virement Mobile Money → Banque' withdrawal. Automatically books the net amount to 52 (Banques), the operator fee to 631700 (Frais sur instruments monétaires électroniques), and credits the provider's Classe 55 account (552100 Orange Money / 552200 Wave / 552300 MTN MoMo / 552400 Moov Money). Cabinet access only."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileMoneyVirementInput"
      responses:
        "201":
          description: Transfer booked as a draft SYSCOHADA entry pending cabinet review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileMoneyVirementResult"
        "400":
          description: Invalid input, e.g. feeAmount ≥ totalAmount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Restricted to cabinet staff; portal roles cannot call this endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pumps:
    get:
      operationId: listPumps
      tags: [station-service]
      summary: "Module P7 (Admin): list registered pumps for a station-service client. PME owner only."
      parameters:
        - name: clientId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of registered pumps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pump"
    post:
      operationId: createPump
      tags: [station-service]
      summary: "Register a new pump with its initial calibration index. The initial_index is used as indexStart for the pump's very first shift."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePumpInput"
      responses:
        "201":
          description: Pump registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pump"

  /pumps/{id}:
    put:
      operationId: updatePump
      tags: [station-service]
      summary: "Update a registered pump's label, fuel type, or initial calibration index."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePumpInput"
      responses:
        "200":
          description: Updated pump
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pump"
        "404":
          description: Pump not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePump
      tags: [station-service]
      summary: "Remove a registered pump. Does not affect existing pump shifts."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Pump deleted

  /pump-assignments:
    get:
      operationId: listPumpAssignments
      tags: [station-service]
      summary: "List pump assignments for a given date (default: today). PME owner only."
      parameters:
        - name: clientId
          in: query
          required: true
          schema: { type: integer }
        - name: date
          in: query
          required: false
          description: "ISO date YYYY-MM-DD. Defaults to today (server time)."
          schema: { type: string, format: date }
      responses:
        "200":
          description: List of pump assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PumpAssignmentItem"
    post:
      operationId: createPumpAssignment
      tags: [station-service]
      summary: "Assign a pompiste to a pump for a given date. PME owner only."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePumpAssignmentInput"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PumpAssignmentItem"

  /pump-assignments/my:
    get:
      operationId: getMyPumpAssignments
      tags: [station-service]
      summary: "Get the pumps assigned to the currently logged-in pompiste for today."
      parameters:
        - name: clientId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of assigned pumps for today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MyPumpAssignment"

  /pump-assignments/{id}:
    delete:
      operationId: deletePumpAssignment
      tags: [station-service]
      summary: "Remove a pump assignment. PME owner only."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Assignment deleted

  /reports/balance:
    get:
      operationId: getBalanceDesComptes
      tags: [reporting]
      summary: "La Balance des Comptes: one row per SYSCOHADA account for the given client/fiscal year, with opening balance, movements and closing balance"
