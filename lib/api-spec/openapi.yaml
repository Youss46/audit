        accountNumber: { type: string }
        label: { type: string }
        amount: { type: integer }

    CompteDeResultatResult:
      type: object
      required: [clientId, year, charges, produits, totalCharges, totalProduits, resultatNet]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        charges:
          type: array
          items:
            $ref: "#/components/schemas/CompteResultatLine"
        produits:
          type: array
          items:
            $ref: "#/components/schemas/CompteResultatLine"
        totalCharges: { type: integer }
        totalProduits: { type: integer }
        resultatNet: { type: integer }

    GrandLivreMovement:
      type: object
      required: [date, label, debitAmount, creditAmount, runningBalance, runningBalanceSide]
      properties:
        date: { type: string, format: date-time }
        label: { type: string }
        debitAmount: { type: integer }
        creditAmount: { type: integer }
        runningBalance: { type: integer }
        runningBalanceSide:
          $ref: "#/components/schemas/BalanceSide"

    GrandLivreAccount:
      type: object
      required:
        [
          accountNumber,
          accountName,
          accountClass,
          initialBalance,
          initialBalanceSide,
          movements,
          totalDebit,
          totalCredit,
          finalBalance,
          finalBalanceSide,
        ]
      properties:
        accountNumber: { type: string }
        accountName: { type: string }
        accountClass: { type: integer }
        initialBalance: { type: integer }
        initialBalanceSide:
          $ref: "#/components/schemas/BalanceSide"
        movements:
          type: array
          items:
            $ref: "#/components/schemas/GrandLivreMovement"
        totalDebit: { type: integer }
        totalCredit: { type: integer }
        finalBalance: { type: integer }
        finalBalanceSide:
          $ref: "#/components/schemas/BalanceSide"

    GrandLivreResult:
      type: object
      required: [clientId, year, accounts]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/GrandLivreAccount"

    MonthlyRevenuePoint:
      type: object
      required: [year, month, label, total]
      properties:
        year: { type: integer }
        month: { type: integer, minimum: 1, maximum: 12 }
        label: { type: string }
        total: { type: integer }

    ExpenseBreakdownEntry:
      type: object
      required: [categoryKey, label, total]
      properties:
        categoryKey: { type: string }
        label: { type: string }
        total: { type: integer }

    PilotageDashboardResult:
      type: object
      required:
        [
          clientId,
          year,
          basis,
          tresorerieNette,
          chiffreAffairesParMois,
          topDepenses,
          chargesParMois,
          margeBruteParMois,
          tresorerieParMois,
          depensesParNature,
          seuilRentabilite,
          kpis,
        ]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        basis:
          type: string
          enum: [engagement, tresorerie]
        tresorerieNette: { type: integer }
        chiffreAffairesParMois:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyRevenuePoint"
        topDepenses:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseBreakdownEntry"
        chargesParMois:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyRevenuePoint"
        margeBruteParMois:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyMarginPoint"
        tresorerieParMois:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyRevenuePoint"
        depensesParNature:
          type: array
          items:
            $ref: "#/components/schemas/NatureBreakdownEntry"
        seuilRentabilite:
          $ref: "#/components/schemas/SeuilRentabilite"
        kpis:
          $ref: "#/components/schemas/ExecutiveDashboardKpis"

    MonthlyMarginPoint:
      type: object
      required: [year, month, label, chiffreAffaires, margeBrute, tauxMarge]
      properties:
        year: { type: integer }
        month: { type: integer, minimum: 1, maximum: 12 }
        label: { type: string }
        chiffreAffaires: { type: integer }
        margeBrute: { type: integer }
        tauxMarge:
          type: number
          nullable: true

    NatureBreakdownEntry:
      type: object
