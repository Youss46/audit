      enum: [MENSUEL, TRIMESTRIEL, ANNUEL]

    FinancialItemStatus:
      type: string
      enum: [ACTIF, SOLDE]

    FinancialItem:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          type,
          accountNumber,
          label,
          principalAmount,
          annualInterestRate,
          startDate,
          termMonths,
          paymentFrequency,
          status,
          installmentsPosted,
          totalInstallments,
          remainingCapital,
          totalInterest,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        type:
          $ref: "#/components/schemas/FinancialItemType"
        accountNumber: { type: string }
        label: { type: string }
        principalAmount: { type: integer }
        annualInterestRate: { type: number }
        startDate: { type: string, format: date-time }
        termMonths: { type: integer }
        paymentFrequency:
          $ref: "#/components/schemas/PaymentFrequency"
        status:
          $ref: "#/components/schemas/FinancialItemStatus"
        installmentsPosted: { type: integer }
        # Computed fields.
        totalInstallments: { type: integer }
        remainingCapital: { type: integer }
        totalInterest: { type: integer }
        nextDueDate: { type: ["string", "null"], format: date-time }
        nextInstallmentNumber: { type: ["integer", "null"] }
        createdByName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FinancialItemInput:
      type: object
      required:
        [clientId, type, accountNumber, label, principalAmount, startDate, termMonths, paymentFrequency]
      properties:
        clientId: { type: integer }
        type:
          $ref: "#/components/schemas/FinancialItemType"
        accountNumber:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        principalAmount:
          type: integer
          minimum: 1
        annualInterestRate:
          type: number
          minimum: 0
        startDate: { type: string, format: date-time }
        termMonths:
          type: integer
          minimum: 1
          maximum: 600
        paymentFrequency:
          $ref: "#/components/schemas/PaymentFrequency"

    FinancialItemUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FinancialItemStatus"
        label: { type: string, minLength: 1 }

    AmortizationRow:
      type: object
      required:
        [installmentNumber, dueDate, annuity, interestAmount, principalAmount, remainingCapital, posted]
      properties:
        installmentNumber: { type: integer }
        dueDate: { type: string, format: date-time }
        annuity: { type: integer }
        interestAmount: { type: integer }
        principalAmount: { type: integer }
        remainingCapital: { type: integer }
