      summary: "Le Bilan Simplifié: Actif / Passif aggregated from SYSCOHADA classes 1 to 5 (plus the fiscal year's résultat net) for the given client/fiscal year"
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bilan simplifié
          content:
