        updatedAt: { type: string, format: date-time }

    FinancialItemInput:
      type: object
      required:
        [clientId, type, accountNumber, label, principalAmount, startDate, termMonths, paymentFrequency]
      properties:
        clientId: { type: integer }
        type:
          $ref: "#/components/schemas/FinancialItemType"
