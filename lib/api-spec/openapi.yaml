    PumpShiftStatus:
      type: string
      enum: [OPEN, VALIDATED]

    LastPumpIndexResult:
      type: object
      required: [indexEnd]
      properties:
        indexEnd:
          type: ["number", "null"]
          description: The ending index (litres) of the last shift for this pump/fuel, or null if none exists yet (first-ever use).

    Pump:
      type: object
