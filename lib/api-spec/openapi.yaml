          properties:
            seuilCritique: { type: number }
            enAlerte: { type: boolean }

    ExecutiveDashboardKpis:
      type: object
      required: [chiffreAffaires, margeBrute, tresorerie]
      properties:
        chiffreAffaires:
          $ref: "#/components/schemas/DashboardKpi"
