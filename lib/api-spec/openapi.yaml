            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/compte-resultat:
    get:
      operationId: getCompteDeResultat
      tags: [reporting]
      summary: "Le Compte de Résultat Simplifié: charges (classe 6) vs produits (classe 7) for the given client/fiscal year, netting to the résultat net"
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compte de résultat simplifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompteDeResultatResult"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/grand-livre:
    get:
      operationId: getGrandLivre
      tags: [reporting]
      summary: "Le Grand Livre: every validated SYSCOHADA account for the given client/fiscal year, grouped with its chronological movements and running balance"
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grand livre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrandLivreResult"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/pilotage:
    get:
      operationId: getPilotageDashboard
      tags: [reporting]
      summary: "Module P4 (Pilotage Dirigeant): plain-language dashboard aggregates for the PME director -- net cash position, monthly revenue trend and top expense categories"
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: basis
          in: query
          required: false
          description: "Module M21: 'engagement' (comptabilité d'engagement, default) or 'tresorerie' (comptabilité de trésorerie -- credit operations count only once settled)"
          schema:
            type: string
            enum: [engagement, tresorerie]
        - name: month
          in: query
          required: false
          description: "Filters the KPI cards (chiffre d'affaires, marge brute, trésorerie) to a specific month (1-12) within the selected year, compared against the month right before it. Omit to default to the most recent month with activity."
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: Pilotage dashboard aggregates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilotageDashboardResult"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/export-liasse:
