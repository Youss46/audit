components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserRole:
      type: string
      enum:
        - expert_comptable
        - collaborateur
        - stagiaire
