            $ref: "#/components/schemas/BilanLine"
        passif:
          type: array
          items:
            $ref: "#/components/schemas/BilanLine"
        totalActif: { type: integer }
        totalPassif: { type: integer }

    CompteResultatLine:
      type: object
      required: [accountNumber, label, amount]
