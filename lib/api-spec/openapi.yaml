            properties:
              itemId: { type: integer }
              itemLabel: { type: string }
              installmentsGenerated: { type: integer }
              transactionIds:
                type: array
                items: { type: integer }
        skipped:
          type: array
          items:
            type: object
            required: [itemId, itemLabel, reason]
            properties:
              itemId: { type: integer }
              itemLabel: { type: string }
              reason: { type: string }

    # -------------------------------------------------------------------------
    # Module M19 — Clôture d'Exercice Comptable
    # -------------------------------------------------------------------------

    FiscalYearClosingStatus:
      type: string
      enum: [OPEN, LOCKED]

    ClosingStatus:
      type: object
      required: [clientId, year, status, openingBalanceGenerated]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        status:
          $ref: "#/components/schemas/FiscalYearClosingStatus"
        netResult: { type: ["integer", "null"] }
        netResultAccount: { type: ["string", "null"] }
        openingBalanceGenerated: { type: boolean }
        lockedAt: { type: ["string", "null"], format: date-time }
        lockedByName: { type: ["string", "null"] }

    ClosePeriodResult:
      type: object
      required: [clientId, year, step1, step2, lockedAt, step4]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        step1:
          type: object
          required:
            [depreciationEntriesGenerated, depreciationEntriesSkipped, financeEntriesGenerated, financeEntriesSkipped]
          properties:
            depreciationEntriesGenerated: { type: integer }
            depreciationEntriesSkipped: { type: integer }
            financeEntriesGenerated: { type: integer }
            financeEntriesSkipped: { type: integer }
        step2:
          type: object
          required: [totalClass6Debits, totalClass7Credits, netResult, resultAccount, closingTransactionId]
          properties:
            totalClass6Debits: { type: integer }
            totalClass7Credits: { type: integer }
            netResult: { type: integer }
            resultAccount: { type: string }
            closingTransactionId: { type: integer }
        lockedAt: { type: string, format: date-time }
        step4:
          type: object
          required: [accountsCarriedForward]
          properties:
            accountsCarriedForward: { type: integer }
            openingTransactionId: { type: ["integer", "null"] }

