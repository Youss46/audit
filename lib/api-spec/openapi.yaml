  /ledger/close-period/{clientId}/{year}:
    post:
      operationId: closePeriod
      tags: [closing]
      summary: Lock a fiscal year (Clôturer définitivement)
      description: >
        Runs the full 4-step SYSCOHADA year-end closing routine:
        (1) generate and auto-validate pending depreciation dotations and financial installments,
        (2) compute net result from Class 6/7 balances and post the clearing entry to account 131 or 139,
        (3) lock the period so no further ledger entries are accepted for this client/year,
        (4) generate the Journal des À-nouveaux carrying forward Class 1-5 balances to year+1.
        Restricted to expert_comptable.
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: integer }
        - name: year
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Period closed and locked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosePeriodResult"
        "403":
          description: Period already locked or insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

