    # ── Module M20-Settings: Cabinet Payroll Rate Configuration ─────────────

    PayrollSettingUpdate:
      type: object
      description: At least one of ratePercentage or ceilingAmount must be provided.
      properties:
        ratePercentage:
          type: ["number", "null"]
          description: New rate as a decimal fraction (e.g. 0.077 for 7.7%)
        ceilingAmount:
          type: ["integer", "null"]
          description: New FCFA ceiling (e.g. 3500000)

    PayrollSetting:
      type: object
      required: [id, firmId, category, ruleName, ruleKey, isEditable, createdAt, updatedAt]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        category:
          type: string
          description: Display group (CNPS | ITS | FDFP | TRANSPORT)
        ruleName:
          type: string
          description: French display label (e.g. "Part patronale — Régime de retraite")
        ruleKey:
          type: string
          description: Stable machine key consumed by the payroll engine (e.g. "cnps_employer_retraite_rate")
        ratePercentage:
          type: ["number", "null"]
          description: Rate as a decimal fraction (e.g. 0.077 = 7.7%). Null for ceiling-only rows.
        ceilingAmount:
          type: ["integer", "null"]
          description: FCFA ceiling (e.g. 3375000 for CNPS plafond). Null for pure-rate rows.
        isEditable:
          type: boolean
          description: Whether the cabinet may edit this row via the UI
        updatedById:
          type: ["integer", "null"]
        updatedByName:
          type: ["string", "null"]
          description: Full name of the last accountant who modified this setting
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }


    MobileMoneyProvider:
      type: string
      enum: [wave, orange_money, mtn_momo, moov_money]

    MobileMoneyVirementInput:
      type: object
      required: [clientId, provider, totalAmount, feeAmount, date]
      properties:
        clientId: { type: integer }
        provider:
          $ref: "#/components/schemas/MobileMoneyProvider"
        totalAmount:
          type: integer
          minimum: 1
          description: "Gross amount withdrawn from the Mobile Money account (FCFA)."
        feeAmount:
          type: integer
          minimum: 0
          description: "Operator withdrawal/transfer fee (FCFA). Must be strictly less than totalAmount. Books to 631700. May be zero."
        date:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
          description: "Optional free-text memo (e.g. 'Retrait Wave agence Cocody')."

    MobileMoneyVirementResult:
      type: object
      required: [transaction]
      properties:
        transaction:
          $ref: "#/components/schemas/TransactionDetail"
