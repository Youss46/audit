    ExportLiasseFiscaleResult:
      type: object
      required: [logged]
      properties:
        logged: { type: boolean }

    # -------------------------------------------------------------------------
    # Module M17 — Fixed Assets & Depreciation Engine
    # -------------------------------------------------------------------------

    DepreciationType:
      type: string
      enum: [LINEAIRE, DEGRESSIF]

    FixedAssetStatus:
      type: string
      enum: [ACTIF, RETIRE]

    FixedAsset:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          accountNumber,
          label,
          acquisitionDate,
          acquisitionCost,
          depreciationType,
          usefulLifeYears,
          salvageValue,
          status,
          pendingSetup,
          cumulativeDepreciation,
          netBookValue,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        accountNumber: { type: string }
        label: { type: string }
        acquisitionDate: { type: string, format: date-time }
        acquisitionCost: { type: integer }
        depreciationType:
          anyOf:
            - $ref: "#/components/schemas/DepreciationType"
            - type: "null"
        usefulLifeYears: { type: ["integer", "null"] }
        salvageValue: { type: integer }
        status:
          $ref: "#/components/schemas/FixedAssetStatus"
        # Auto-sync: if this asset was created from a validated Class 2 transaction,
        # records the source transaction id for traceability.
        syncedFromTransactionId: { type: ["integer", "null"] }
        # True when depreciationType or usefulLifeYears has not yet been filled in
        # by the accountant. The depreciation schedule is not computed for these.
        pendingSetup: { type: boolean }
        # Computed fields (as of the requested fiscal year).
        cumulativeDepreciation: { type: integer }
        netBookValue: { type: integer }
        createdByName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FixedAssetInput:
      type: object
      required:
        [clientId, accountNumber, label, acquisitionDate, acquisitionCost, depreciationType, usefulLifeYears]
      properties:
        clientId: { type: integer }
        accountNumber:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        acquisitionDate: { type: string, format: date-time }
        acquisitionCost:
          type: integer
          minimum: 1
        depreciationType:
          $ref: "#/components/schemas/DepreciationType"
        usefulLifeYears:
          type: integer
          minimum: 1
          maximum: 50
        salvageValue:
          type: integer
          minimum: 0

    FixedAssetUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FixedAssetStatus"
        label: { type: string, minLength: 1 }
        # Completing the setup for auto-synced pending-setup assets.
        depreciationType:
          anyOf:
            - $ref: "#/components/schemas/DepreciationType"
            - type: "null"
        usefulLifeYears:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 50
            - type: "null"
        salvageValue: { type: integer, minimum: 0 }

    DepreciationRow:
      type: object
      required:
        [year, openingVNC, depreciableBase, rate, annuity, cumulativeDepreciation, closingVNC, isProrata]
      properties:
        year: { type: integer }
        openingVNC: { type: integer }
        depreciableBase: { type: integer }
        rate: { type: number }
        annuity: { type: integer }
        cumulativeDepreciation: { type: integer }
        closingVNC: { type: integer }
        isProrata: { type: boolean }

    DepreciationSchedule:
      type: object
      required: [assetId, rows]
      properties:
        assetId: { type: integer }
        rows:
          type: array
          items:
            $ref: "#/components/schemas/DepreciationRow"

    GenerateClosingsResult:
      type: object
      required: [clientId, year, generated, skipped]
      properties:
        clientId: { type: integer }
        year: { type: integer }
        generated:
          type: array
          items:
            type: object
            required: [assetId, assetLabel, annuity, transactionId]
            properties:
              assetId: { type: integer }
              assetLabel: { type: string }
              annuity: { type: integer }
              transactionId: { type: integer }
        skipped:
          type: array
          items:
            type: object
            required: [assetId, assetLabel, reason]
            properties:
              assetId: { type: integer }
              assetLabel: { type: string }
              reason: { type: string }

    # -------------------------------------------------------------------------
