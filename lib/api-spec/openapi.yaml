          $ref: "#/components/schemas/UserRole"
        targetType:
          $ref: "#/components/schemas/CollaborationTargetType"
        targetId: { type: integer }
        message: { type: string }
        attachmentFileName: { type: ["string", "null"] }
        attachmentMimeType: { type: ["string", "null"] }
        attachmentUrl:
          type: ["string", "null"]
          description: Data URL (data:<mime>;base64,<data>) usable directly as a link/preview href
        createdAt: { type: string, format: date-time }

    CollaborationThread:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          targetType,
          targetId,
          isResolved,
          commentCount,
          lastMessage,
          lastMessageAt,
          lastAuthorRole,
          targetLabel,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        targetType:
          $ref: "#/components/schemas/CollaborationTargetType"
        targetId: { type: integer }
        isResolved: { type: boolean }
        resolvedByName: { type: ["string", "null"] }
        resolvedAt: { type: ["string", "null"], format: date-time }
        commentCount: { type: integer }
        lastMessage: { type: ["string", "null"] }
        lastMessageAt: { type: ["string", "null"], format: date-time }
        lastAuthorRole:
          type: ["string", "null"]
        targetLabel:
          type: string
          description: Human-readable French summary of the discussed record (e.g. the transaction's date + libellé)
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CollaborationThreadDetail:
      type: object
      required: [targetType, targetId, isResolved, comments]
      properties:
        threadId: { type: ["integer", "null"] }
        targetType:
          $ref: "#/components/schemas/CollaborationTargetType"
        targetId: { type: integer }
        clientId: { type: integer }
        isResolved: { type: boolean }
        resolvedByName: { type: ["string", "null"] }
        resolvedAt: { type: ["string", "null"], format: date-time }
        targetLabel: { type: string }
        comments:
          type: array
          items:
            $ref: "#/components/schemas/ContextualComment"

    NotificationItem:
      type: object
