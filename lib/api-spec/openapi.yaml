          seuilRentabilite,
        ]
      properties:
        chiffreAffairesAnnuel: { type: integer }
        chargesFixesAnnuelles: { type: integer }
        chargesVariablesAnnuelles: { type: integer }
        tauxMargeSurCoutsVariables:
          type: number
          nullable: true
        seuilRentabilite:
          type: number
          nullable: true

    DashboardKpi:
      type: object
      required: [moisCourant, moisPrecedent, variationPct]
      properties:
        moisCourant: { type: number }
        moisPrecedent: { type: number }
        variationPct:
          type: number
          nullable: true

    MargeBruteKpi:
      allOf:
        - $ref: "#/components/schemas/DashboardKpi"
        - type: object
          required: [tauxMargeMoisCourant, tauxMargeMoisPrecedent]
          properties:
