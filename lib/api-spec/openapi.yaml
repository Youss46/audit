          type: number
          minimum: 0
        startDate: { type: string, format: date-time }
        termMonths:
          type: integer
          minimum: 1
          maximum: 600
        paymentFrequency:
          $ref: "#/components/schemas/PaymentFrequency"

    FinancialItemUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FinancialItemStatus"
        label: { type: string, minLength: 1 }

    AmortizationRow:
      type: object
      required:
        [installmentNumber, dueDate, annuity, interestAmount, principalAmount, remainingCapital, posted]
      properties:
        installmentNumber: { type: integer }
        dueDate: { type: string, format: date-time }
        annuity: { type: integer }
        interestAmount: { type: integer }
        principalAmount: { type: integer }
        remainingCapital: { type: integer }
        posted: { type: boolean }

    AmortizationSchedule:
      type: object
      required: [itemId, rows]
      properties:
        itemId: { type: integer }
        rows:
          type: array
          items:
            $ref: "#/components/schemas/AmortizationRow"

    GenerateFinanceJournalEntriesResult:
      type: object
      required: [clientId, generated, skipped]
      properties:
        clientId: { type: integer }
        generated:
          type: array
          items:
            type: object
            required: [itemId, itemLabel, installmentsGenerated, transactionIds]
            properties:
              itemId: { type: integer }
              itemLabel: { type: string }
              installmentsGenerated: { type: integer }
              transactionIds:
                type: array
                items: { type: integer }
        skipped:
          type: array
          items:
            type: object
            required: [itemId, itemLabel, reason]
            properties:
              itemId: { type: integer }
              itemLabel: { type: string }
              reason: { type: string }

    # -------------------------------------------------------------------------
    # Module M19 — Clôture d'Exercice Comptable
    # -------------------------------------------------------------------------

