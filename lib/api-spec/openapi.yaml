    CreatePumpInput:
      type: object
      required: [clientId, label, fuelType]
      properties:
        clientId: { type: integer }
        label:
          type: string
          minLength: 1
        fuelType:
          $ref: "#/components/schemas/FuelType"
        initialIndex:
          type: number
          minimum: 0
          default: 0

    UpdatePumpInput:
      type: object
      properties:
        label:
          type: string
          minLength: 1
        fuelType:
          $ref: "#/components/schemas/FuelType"
        initialIndex:
          type: number
          minimum: 0

    PumpAssignmentItem:
      type: object
      required: [id, clientId, pumpId, pumpLabel, fuelType, staffUserId, staffName, shiftDate, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        pumpId: { type: integer }
        pumpLabel: { type: string }
        fuelType:
          $ref: "#/components/schemas/FuelType"
        staffUserId: { type: integer }
        staffName: { type: string }
        shiftDate: { type: string, format: date }
        createdAt: { type: string, format: date-time }

    MyPumpAssignment:
      type: object
      required: [id, pumpId, label, fuelType, shiftDate]
      properties:
        id: { type: integer }
        pumpId: { type: integer }
        label: { type: string }
        fuelType:
          $ref: "#/components/schemas/FuelType"
        shiftDate: { type: string, format: date }

    CreatePumpAssignmentInput:
      type: object
      required: [clientId, pumpId, staffUserId, shiftDate]
      properties:
        clientId: { type: integer }
        pumpId: { type: integer }
        staffUserId: { type: integer }
        shiftDate:
          type: string
          format: date
          description: "ISO date YYYY-MM-DD for which this assignment is valid."

    PumpShift:
      type: object
      required:
        [
          id,
          clientId,
          pumpLabel,
          fuelType,
          indexStart,
          indexEnd,
          volumeLiters,
          status,
          createdAt,
        ]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        cashRegisterId: { type: ["integer", "null"] }
        pumpLabel: { type: string }
        fuelType:
          $ref: "#/components/schemas/FuelType"
        indexStart: { type: number }
        indexEnd: { type: number }
        volumeLiters:
          type: number
          description: Computed as indexEnd - indexStart.
        status:
          $ref: "#/components/schemas/PumpShiftStatus"
        unitPrice: { type: ["integer", "null"] }
        paymentMethod:
          anyOf:
            - $ref: "#/components/schemas/PaymentMethod"
            - type: "null"
        expectedAmount:
          type: ["integer", "null"]
          description: unitPrice x volumeLiters, rounded to the nearest FCFA.
        declaredPhysicalAmount: { type: ["integer", "null"] }
        discrepancyAmount: { type: ["integer", "null"] }
        cashAmount:
          type: ["integer", "null"]
          description: "FCFA collected in cash (Espèces) for this shift. Null for shifts created before the split-payment upgrade."
        waveAmount:
          type: ["integer", "null"]
          description: "FCFA collected via Wave (552200)."
        orangeMoneyAmount:
          type: ["integer", "null"]
          description: "FCFA collected via Orange Money (552100)."
        mtnMomoAmount:
          type: ["integer", "null"]
          description: "FCFA collected via MTN MoMo (552300)."
        transactionId: { type: ["integer", "null"] }
        discrepancyTransactionId: { type: ["integer", "null"] }
        openedByName: { type: ["string", "null"] }
        validatedByName: { type: ["string", "null"] }
        validatedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    PumpShiftCreateInput:
      type: object
      required: [clientId, pumpLabel, fuelType, indexEnd]
      properties:
        clientId: { type: integer }
        pumpLabel:
          type: string
          minLength: 1
        fuelType:
          $ref: "#/components/schemas/FuelType"
        indexEnd:
          type: number
          minimum: 0

    PumpShiftValidateInput:
      type: object
      required: [unitPrice]
      properties:
        unitPrice:
          type: integer
          minimum: 1
        cashAmount:
          type: integer
          minimum: 0
          default: 0
          description: "FCFA collected in cash (Espèces). Maps to the pompiste's personal 5711xx sub-account. The sum cashAmount + waveAmount + orangeMoneyAmount + mtnMomoAmount must equal the computed expectedAmount."
        waveAmount:
          type: integer
          minimum: 0
          default: 0
          description: "FCFA collected via Wave. Maps to account 552200."
        orangeMoneyAmount:
          type: integer
          minimum: 0
          default: 0
          description: "FCFA collected via Orange Money. Maps to account 552100."
        mtnMomoAmount:
          type: integer
          minimum: 0
          default: 0
          description: "FCFA collected via MTN MoMo. Maps to account 552300."
        declaredPhysicalAmount:
          description: "Required when cashAmount > 0 -- the cash physically counted for this shift (used to compute the écart de caisse against the cashAmount)."
          type: ["integer", "null"]

    PumpShiftValidateResult:
      type: object
      required: [pumpShift, saleTransaction]
      properties:
        pumpShift:
          $ref: "#/components/schemas/PumpShift"
        saleTransaction:
          $ref: "#/components/schemas/TransactionDetail"
        discrepancyTransaction:
          anyOf:
            - $ref: "#/components/schemas/TransactionDetail"
            - type: "null"

    UpdateJournalLinesInput:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, accountNumber]
            properties:
              id: { type: integer }
              accountNumber:
                type: string
                minLength: 1

    BalanceSide:
      type: string
      enum: [debiteur, crediteur]

    BalanceRow:
