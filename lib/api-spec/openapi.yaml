      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Validated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  /invoices/{id}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [invoicing]
      summary: Mark a validated invoice as paid (PAYE) — M28
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invoice marked as paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  /invoices/{id}/cancel:
    post:
      operationId: cancelInvoice
      tags: [invoicing]
      summary: Cancel a draft invoice (BROUILLON only — validated invoices require a credit note) — M28
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  /invoices/{id}/pdf:
    get:
      operationId: downloadInvoicePdf
      tags: [invoicing]
      summary: Fetch the generated PDF for a validated invoice (base64) — M28
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: PDF data (base64-encoded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicePdfResponse"

  /invoices/{id}/credit-note:
    post:
      operationId: createCreditNote
      tags: [invoicing]
      summary: Generate a structured credit note (avoir) reversing a validated invoice — M28
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditNoteInput"
      responses:
        "201":
          description: Credit note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

    # -------------------------------------------------------------------------
    # Module M28 — Facturier Client & Auto-Génération de Pièces
    # -------------------------------------------------------------------------


components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserRole:
      type: string
      enum:
        - expert_comptable
        - collaborateur
        - stagiaire
        - client_pme
        - client_staff

    UserStatus:
      type: string
      enum:
        - active
        - invited
        - disabled

    User:
      type: object
      required: [id, firmId, email, fullName, role, status, createdAt]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        clientId:
          type: ["integer", "null"]
          description: Set for client_pme and client_staff accounts; scopes the Espace PME portal to one client dossier.
        firmName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        roleId:
          type: ["integer", "null"]
          description: Module M29 - set only for client_staff accounts; references the assigned staff Role.
        roleLabel:
          type: ["string", "null"]
          description: Module M29 - French display label of the staff Role (e.g. "Pompiste"), null for non-client_staff accounts.
        roleCode:
          type: ["string", "null"]
          description: Module M29 - stable machine key of the staff Role (e.g. "POMPISTE", "AGENT_TERRAIN"), null for non-client_staff accounts. Use for conditional logic; prefer roleLabel for display.
        permissions:
          type: array
          items: { type: string }
          description: Module M29 - the effective permission keys for a client_staff account, resolved from its Role at login time. Empty for every other role.
        temporaryPassword:
          type: ["string", "null"]
          description: Module M33 - only ever populated in the response of POST /users, immediately after account creation; the plaintext auto-generated temporary password to hand to the new user. Always null on every other endpoint.

    RegisterInput:
      type: object
      required: [firmName, fullName, email, password]
      properties:
        firmName: { type: string, minLength: 2 }
        fullName: { type: string, minLength: 2 }
        email: { type: string, minLength: 3 }
        password: { type: string, minLength: 8 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, minLength: 3 }
        password: { type: string }

    AuthResponse:
      type: object
      required: [status, token]
      properties:
        status:
          type: string
          enum: [OK, FORCE_PASSWORD_CHANGE]
          description: >-
            Module M33 - "FORCE_PASSWORD_CHANGE" means `token` is a
            restricted, short-lived token that only works against
            POST /auth/reset-first-password; `user` is omitted in that
            case and the frontend must redirect there before rendering
            anything else. "OK" means a normal full session.
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    ResetFirstPasswordInput:
      type: object
      required: [newPassword, confirmPassword]
      description: Module M33 - body for POST /auth/reset-first-password.
      properties:
        newPassword:
          type: string
          minLength: 8
          description: Must contain at least 8 characters, one digit and one special character.
        confirmPassword:
          type: string
          minLength: 8

    UserInput:
      type: object
      required: [email, fullName, role]
      description: >-
        Module M33 - no password field: the server always auto-generates a
        temporary password (returned once as `temporaryPassword` on the
        created User) rather than accepting one from the admin.
      properties:
        email: { type: string, minLength: 3 }
        fullName: { type: string, minLength: 2 }
        role:
          $ref: "#/components/schemas/UserRole"
        clientId:
          type: integer
          description: Required when role is client_pme; links the portal account to its client dossier.

    UserUpdate:
      type: object
      properties:
        fullName: { type: string, minLength: 2 }
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        clientId:
          type: ["integer", "null"]

    # Module M29 (RBAC & Gestion du Personnel PME).
    Role:
      type: object
      required: [id, code, label, permissions]
      properties:
        id: { type: integer }
        code: { type: string, description: "Stable machine key, e.g. \"POMPISTE\"." }
        label: { type: string, description: "French display label, e.g. \"Agent Terrain / Pompiste\"." }
        description: { type: ["string", "null"] }
        permissions:
          type: array
          items: { type: string }

    StaffUser:
      type: object
      required: [id, fullName, email, status, roleId, createdAt]
      properties:
        id: { type: integer }
        fullName: { type: string }
        email: { type: string }
        status:
          $ref: "#/components/schemas/UserStatus"
        roleId: { type: ["integer", "null"] }
        roleCode: { type: ["string", "null"] }
        roleLabel: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        associatedCashAccountNumber:
          type: ["string", "null"]
          description: Module P6 (Un Pompiste = Une Caisse) - the personal SYSCOHADA cash sub-account (e.g. "571101") auto-assigned when this account is a POMPISTE for a STATION_SERVICE client. Null for every other account.
        temporaryPassword:
          type: ["string", "null"]
          description: Module M33 - only ever populated in the response of POST /staff, immediately after account creation; the plaintext auto-generated temporary password to hand to the new staff member. Always null on every other endpoint.

    StaffInput:
      type: object
      required: [email, fullName, roleId]
      description: >-
        Module M33 - no password field: the server always auto-generates a
        temporary password (returned once as `temporaryPassword` on the
        created StaffUser) rather than accepting one from the owner.
      properties:
        email: { type: string, minLength: 3 }
        fullName: { type: string, minLength: 2 }
        roleId: { type: integer }

    StaffUpdate:
      type: object
      properties:
        fullName: { type: string, minLength: 2 }
        status:
          $ref: "#/components/schemas/UserStatus"
        roleId: { type: integer }

    AuditLog:
      type: object
      required: [id, firmId, action, entityType, createdAt]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        userId: { type: ["integer", "null"] }
        userName: { type: ["string", "null"] }
        userRole: { type: ["string", "null"] }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: ["string", "null"] }
        details: { type: ["string", "null"] }
        ipAddress: { type: ["string", "null"] }
        # Module M14: "before"/"after" snapshot for a modification (e.g. an
        # AI_OVERRIDE, where the accountant corrected an AI-extracted
        # value). Null for pure creations.
        changesPayload:
          type: ["object", "null"]
          properties:
            before: { type: ["object", "null"], additionalProperties: true }
            after: { type: ["object", "null"], additionalProperties: true }
        createdAt: { type: string, format: date-time }

    Sector:
      type: string
      enum:
        - commerce
        - artisanat
        - services
        - STATION_SERVICE

    AccountingSystem:
      type: string
      enum:
        - SMT
        - ALLEGE
        - NORMAL

    TaxRegime:
      type: string
      enum:
        - REEL_NORMAL
        - REEL_SIMPLIFIE
        - ENTREPRENANT
        - EXONERE

    MissionStatus:
      type: string
      enum:
        - en_attente
        - en_cours
        - anomalie
        - valide
        - visa_emis

    Client:
      type: object
      required:
        [
          id,
          firmId,
          name,
          legalForm,
          sector,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        name: { type: string }
        legalForm: { type: string }
        sector:
          $ref: "#/components/schemas/Sector"
        rccm: { type: ["string", "null"] }
        taxId: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        contactName: { type: ["string", "null"] }
        annualTurnover: { type: ["number", "null"] }
        accountingSystem:
          oneOf:
            - $ref: "#/components/schemas/AccountingSystem"
            - type: "null"
        taxRegime:
          $ref: "#/components/schemas/TaxRegime"
        isVatRegistered: { type: boolean }
        # Null means no mission has ever been opened for this client yet.
        missionStatus:
          oneOf:
            - $ref: "#/components/schemas/MissionStatus"
            - type: "null"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ClientInput:
      type: object
      required: [name, legalForm, sector]
      properties:
        name: { type: string, minLength: 1 }
        legalForm: { type: string, minLength: 1 }
        sector:
          $ref: "#/components/schemas/Sector"
        rccm: { type: string }
        taxId: { type: string }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        contactName: { type: string }
        annualTurnover: { type: number }
        taxRegime:
          $ref: "#/components/schemas/TaxRegime"
        isVatRegistered: { type: boolean }

    ClientUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        legalForm: { type: string, minLength: 1 }
        sector:
          $ref: "#/components/schemas/Sector"
        rccm: { type: string }
        taxId: { type: string }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        contactName: { type: string }
        annualTurnover: { type: number }
        taxRegime:
          $ref: "#/components/schemas/TaxRegime"
        isVatRegistered: { type: boolean }
        missionStatus:
          $ref: "#/components/schemas/MissionStatus"

    DashboardSummary:
      type: object
      required:
        [
          totalClients,
          totalMissions,
          missionsEnCours,
          enAttente,
          enCours,
          anomalie,
          valide,
          visaEmis,
          anomalyAlerts,
        ]
      properties:
        totalClients: { type: integer }
        totalMissions: { type: integer }
        missionsEnCours:
          type: integer
          description: Missions currently "en_cours" or "anomalie" (active review work).
        enAttente: { type: integer }
        enCours: { type: integer }
        anomalie: { type: integer }
        valide: { type: integer }
        visaEmis: { type: integer }
        anomalyAlerts:
          type: integer
          description: Count of individual checklist items currently flagged "anomalie" across all active missions.

    ChecklistItemStatus:
      type: string
      enum:
        - a_verifier
        - conforme
        - anomalie

    ChecklistItem:
      type: object
      required: [id, missionId, orderIndex, label, status, updatedAt]
      properties:
        id: { type: integer }
        missionId: { type: integer }
        orderIndex: { type: integer }
        label: { type: string }
        status:
          $ref: "#/components/schemas/ChecklistItemStatus"
        note: { type: ["string", "null"] }
        updatedAt: { type: string, format: date-time }

    ChecklistItemUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ChecklistItemStatus"
        note: { type: string }

    Mission:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          fiscalYear,
          accountingSystem,
          status,
          checklistTotal,
          checklistCompleted,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        clientLegalForm: { type: ["string", "null"] }
        clientSector:
          anyOf:
            - $ref: "#/components/schemas/Sector"
            - type: "null"
        clientAnnualTurnover: { type: ["number", "null"] }
        fiscalYear: { type: integer }
        accountingSystem:
          $ref: "#/components/schemas/AccountingSystem"
        status:
          $ref: "#/components/schemas/MissionStatus"
        checklistTotal: { type: integer }
        checklistCompleted: { type: integer }
        assignedToId: { type: ["integer", "null"] }
        assignedToName: { type: ["string", "null"] }
        visaStampCode: { type: ["string", "null"] }
        visaIssuedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MissionDetail:
      allOf:
        - $ref: "#/components/schemas/Mission"
        - type: object
          required: [checklist]
          properties:
            checklist:
              type: array
              items:
                $ref: "#/components/schemas/ChecklistItem"

    MissionInput:
      type: object
      required: [clientId, fiscalYear]
      properties:
        clientId: { type: integer }
        fiscalYear: { type: integer }
        assignedToId: { type: ["integer", "null"] }

    MissionUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/MissionStatus"
        assignedToId: { type: ["integer", "null"] }

    DocumentInput:
      type: object
      required: [fileName, mimeType, fileData, category]
      properties:
        fileName:
          type: string
          minLength: 1
        mimeType:
          type: string
          minLength: 1
        fileData:
          type: string
          description: Base64-encoded file content
        category:
          type: string
          minLength: 1
        missionId:
          type: integer

    Document:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          category,
          fileName,
          mimeType,
          fileSize,
          createdAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        missionId: { type: ["integer", "null"] }
        category: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        fileSize: { type: integer }
        uploadedByName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    DocumentDetail:
      allOf:
        - $ref: "#/components/schemas/Document"
        - type: object
          required: [fileData]
          properties:
            fileData:
              type: string
              description: Base64-encoded file content

    TransactionType:
      type: string
      enum:
        - recette
        - depense

    TransactionStatus:
      type: string
      enum:
        - a_valider
        - valide
        - anomalie

    TransactionSource:
      type: string
      enum:
        - pme_entry
        - manual_cabinet
        - settlement
        - caisse_closure

    PendingCounts:
      type: object
      required: [pendingExpenses, pendingRevenues, totalPending]
      properties:
        pendingExpenses:
          type: integer
        pendingRevenues:
          type: integer
        totalPending:
          type: integer

    PaymentMethod:
      type: string
      enum:
        - especes
        - mobile_money
        - cheque
        - virement

    PaymentType:
      type: string
      enum:
        - cash
        - credit

    TransactionCategoryOption:
      type: object
      required: [key, label]
      properties:
        key: { type: string }
        label: { type: string }

    JournalLine:
      type: object
      required: [id, transactionId, accountNumber, debitAmount, creditAmount]
      properties:
        id: { type: integer }
        transactionId: { type: integer }
        accountNumber: { type: string }
        label: { type: ["string", "null"] }
        debitAmount: { type: integer }
        creditAmount: { type: integer }

    Transaction:
      type: object
      required:
        [
          id,
          firmId,
          clientId,
          date,
          label,
          amount,
          type,
          paymentType,
          status,
          source,
          anomalies,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        firmId: { type: integer }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        date: { type: string, format: date-time }
        label: { type: string }
        amount: { type: integer }
        type:
          $ref: "#/components/schemas/TransactionType"
        category: { type: ["string", "null"] }
        categoryLabel: { type: ["string", "null"] }
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        paymentMethod:
          anyOf:
            - $ref: "#/components/schemas/PaymentMethod"
            - type: "null"
        dueDate: { type: ["string", "null"], format: date-time }
        status:
          $ref: "#/components/schemas/TransactionStatus"
        source:
          $ref: "#/components/schemas/TransactionSource"
        documentId: { type: ["integer", "null"] }
        documentFileName: { type: ["string", "null"] }
        clarificationNote: { type: ["string", "null"] }
        settledAt: { type: ["string", "null"], format: date-time }
        parentTransactionId: { type: ["integer", "null"] }
        cashRegisterId: { type: ["integer", "null"] }
        cashRegisterName: { type: ["string", "null"] }
        cashRegisterAccountNumber:
          type: ["string", "null"]
          description: Module P6 (Un Pompiste = Une Caisse) - the register's personal SYSCOHADA sub-account (e.g. "571101"), so the cabinet reconciliation view can show it next to the pompiste's name.
        createdByName: { type: ["string", "null"] }
        validatedByName: { type: ["string", "null"] }
        validatedAt: { type: ["string", "null"], format: date-time }
        anomalies:
          description: >-
            Module M8 (Anomalie & Doublon Detector): rule-based flags computed
            automatically when the entry is created or its journal lines are
            adjusted. Empty when no anomaly was detected.
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TransactionDetail:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          required: [journalLines]
          properties:
            journalLines:
              type: array
              items:
                $ref: "#/components/schemas/JournalLine"

    # Approve endpoint response: extends TransactionDetail with the list of
    # fixed-asset stubs that were auto-created from Class 2 debit lines.
    AutoCreatedAssetRef:
      type: object
      required: [id, accountNumber, label, acquisitionCost]
      properties:
        id: { type: integer }
        accountNumber: { type: string }
        label: { type: string }
        acquisitionCost: { type: integer }

    ApproveTransactionResult:
      allOf:
        - $ref: "#/components/schemas/TransactionDetail"
        - type: object
          properties:
            autoCreatedAssets:
              description: >
                Fixed-asset stubs automatically created for every Class 2 debit
                line (accounts 20x–26x, 28x–29x) detected in the validated
                transaction. Empty array when no Class 2 lines are present.
              type: array
              items:
                $ref: "#/components/schemas/AutoCreatedAssetRef"

    TransactionInput:
      type: object
      required: [clientId, date, label, amount, type, category, paymentType]
      properties:
        clientId: { type: integer }
        date: { type: string, format: date-time }
        label:
          type: string
          minLength: 1
        amount:
          type: integer
          minimum: 1
        type:
          $ref: "#/components/schemas/TransactionType"
        category:
          type: string
          minLength: 1
        paymentType:
          $ref: "#/components/schemas/PaymentType"
        paymentMethod:
          description: Required when paymentType is "cash"; ignored for "credit".
          anyOf:
            - $ref: "#/components/schemas/PaymentMethod"
            - type: "null"
        dueDate:
          description: Required when paymentType is "credit" ("Date d'échéance"); ignored for "cash".
          type: ["string", "null"]
          format: date-time
        documentId: { type: ["integer", "null"] }
        cashRegisterId:
          description: Required when paymentMethod is "especes" (module P5 Caisse Terrain).
          type: ["integer", "null"]

    TransactionRejectInput:
      type: object
      required: [clarificationNote]
      properties:
        clarificationNote:
          type: string
          minLength: 1

    TransactionSettleInput:
      type: object
      required: [paymentMethod]
      properties:
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        cashRegisterId:
          description: Required when paymentMethod is "especes" (module P5 Caisse Terrain).
          type: ["integer", "null"]

    BatchCreateTransactionsInput:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TransactionInput"

    BatchCreateTransactionsResult:
      type: object
      required: [created, errors]
      properties:
        created:
          type: array
          items:
            $ref: "#/components/schemas/TransactionDetail"
        errors:
          type: array
          items:
            type: object
            required: [index, error]
            properties:
              index: { type: integer }
              error: { type: string }

    CashRegister:
      type: object
      required: [id, name, clientId, currentBalance, isActive, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        clientId: { type: integer }
        clientName: { type: ["string", "null"] }
        currentBalance: { type: integer }
        syscohadaAccount:
          type: ["string", "null"]
          description: Module P6 (Un Pompiste = Une Caisse) - personal SYSCOHADA sub-account (e.g. "571101"), set only for a per-pompiste drawer. Null for a general/shared register.
        isActive: { type: boolean }
        ownerUserId:
          type: ["integer", "null"]
          description: Module P6 - the one staff member (POMPISTE) this register is dedicated to. Null for a general/shared register.
        ownerUserName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    CashRegisterInput:
      type: object
      required: [name, clientId]
      properties:
        name:
          type: string
          minLength: 1
        clientId: { type: integer }

    ClosureStatus:
      type: string
      enum: [OPEN, CLOSED]

    DailyClosure:
      type: object
      required:
        [
          id,
          cashRegisterId,
          date,
          openingBalance,
          liveBalance,
          status,
          createdAt,
        ]
      properties:
        id: { type: integer }
        cashRegisterId: { type: integer }
        date: { type: string }
        openingBalance: { type: integer }
        expectedClosingBalance: { type: ["integer", "null"] }
        physicalClosingBalance: { type: ["integer", "null"] }
        discrepancyAmount: { type: ["integer", "null"] }
        # The cash register's live currentBalance at the time of this
        # response. Only meaningful as a "solde théorique" while the
        # closure is still OPEN -- frozen into expectedClosingBalance once
        # closed.
        liveBalance: { type: integer }
        status:
          $ref: "#/components/schemas/ClosureStatus"
        comment: { type: ["string", "null"] }
        closedById: { type: ["integer", "null"] }
        closedByName: { type: ["string", "null"] }
        closedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    CloseDailyClosureInput:
      type: object
      required: [physicalClosingBalance]
      properties:
        physicalClosingBalance: { type: integer, minimum: 0 }
        comment:
          description: Mandatory ("Justification") whenever the physical count doesn't match the theoretical balance.
          type: ["string", "null"]

    CloseDailyClosureResult:
      type: object
      required: [closure, cashRegister]
      properties:
        closure:
          $ref: "#/components/schemas/DailyClosure"
        cashRegister:
          $ref: "#/components/schemas/CashRegister"
        summaryTransaction:
          anyOf:
            - $ref: "#/components/schemas/TransactionDetail"
            - type: "null"

    FuelType:
      type: string
