        id: { type: integer }
        clientId: { type: integer }
        label: { type: string }
        fuelType:
          $ref: "#/components/schemas/FuelType"
        initialIndex:
          type: number
          description: Physical meter reading at the time this pump was registered. Used as indexStart for the very first shift.
