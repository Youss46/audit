<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="description" content="M15-AUDIT — built on Replit. Update this description to reflect the app." />

    <meta property="og:title" content="M15-AUDIT" />
    <meta property="og:description" content="M15-AUDIT — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="M15-AUDIT" />
    <meta name="twitter:description" content="M15-AUDIT — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="M15 AUDIT" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1e3a5f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        font-family: 'Inter', sans-serif;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #splash.splash-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Badge M15 */
      .splash-badge {
        width: 80px;
        height: 80px;
        background: #ffffff;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 700;
        color: #1e3a5f;
        letter-spacing: -1px;
        box-shadow: 0 0 0 0 rgba(255,255,255,0.4);
        animation: badge-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                   badge-pulse 2.2s ease-in-out 0.7s infinite;
      }

      @keyframes badge-in {
        from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
        to   { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      @keyframes badge-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); }
        50%       { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
      }

      /* "AUDIT" wordmark */
      .splash-wordmark {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        animation: wordmark-in 0.55s ease 0.45s both;
      }

      @keyframes wordmark-in {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .splash-wordmark span:first-child {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 5px;
        text-transform: uppercase;
      }

      .splash-wordmark span:last-child {
        font-size: 10px;
        font-weight: 500;
        color: rgba(255,255,255,0.45);
        letter-spacing: 2.5px;
        text-transform: uppercase;
      }

      /* Progress bar */
      .splash-bar-track {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.8));
        border-radius: 0 2px 2px 0;
        animation: bar-fill 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
      }

      @keyframes bar-fill {
        0%   { width: 0%; }
        60%  { width: 80%; }
        100% { width: 100%; }
      }

      /* Prevent FOUC on body */
      body { margin: 0; background: #1e3a5f; }
    </style>
  </head>
  <body>
    <!-- Splash screen — hidden by JS after React mounts -->
    <div id="splash" aria-hidden="true">
      <div class="splash-badge">M15</div>
      <div class="splash-wordmark">
        <span>AUDIT</span>
        <span>Plateforme comptable</span>
      </div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
