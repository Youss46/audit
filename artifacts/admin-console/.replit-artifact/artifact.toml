kind = "web"
previewPath = "/m15-admin/"
title = "Console Super Admin"
version = "1.0.0"
id = "artifacts/admin-console"
router = "path"

[[services]]
name = "web"
paths = [ "/m15-admin/" ]
localPort = 26208

[services.development]
run = "pnpm --filter @workspace/admin-console run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-console", "run", "build" ]
serve = "static"
publicDir = "artifacts/admin-console/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26208"
BASE_PATH = "/m15-admin/"
