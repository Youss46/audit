# nixpacks.toml — Configuration du build Railway (monorepo pnpm)
# Nixpacks détecte pnpm et lance automatiquement "pnpm i --frozen-lockfile"
# avant le buildCommand. On surcharge ici la phase d'installation pour éviter
# l'erreur ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
